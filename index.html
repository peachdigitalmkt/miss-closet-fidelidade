<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Miss Closet - Fidelidade</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Miss Closet">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0ABAB5">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" type="image/png" href="icon.png">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #0ABAB5, #08a39e);
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', sans-serif;
      padding-top: env(safe-area-inset-top);
    }

    img {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: white;
      padding: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      margin-bottom: 24px;
    }

    p {
      color: white;
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    small {
      color: rgba(255,255,255,0.8);
      font-size: 14px;
      margin-bottom: 40px;
    }

    .spinner {
      border: 3px solid rgba(255,255,255,0.3);
      border-top: 3px solid white;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <img src="icon.png" alt="Miss Closet">
  <p>Miss Closet</p>
  <small>Carregando...</small>
  <div class="spinner"></div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(console.error);
    }

    // Redireciona para o WebApp após 1.5s (mostra splash antes)
    setTimeout(function() {
      window.location.replace(
        'https://script.google.com/macros/s/AKfycbxYf_wNx9WpFAO4sAtoX5uidRTsPLBnYJITuwygBR6rec7CPXlfXqsp1RTWUEh5N4V6/exec'
      );
    }, 1500);
  </script>
</body>
</html>
